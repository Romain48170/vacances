<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Destinations - Vacances Equipe</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0d12;
  --surface: #121620;
  --surface2: #181d2a;
  --surface3: #1e2535;
  --text: #e8eaf2;
  --muted: #5c6480;
  --border: #232840;
  --radius: 16px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; min-height: 100vh; overflow-x: hidden; }
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,.35) 0%, transparent 100%),
    radial-gradient(1px 1px at 25% 40%, rgba(255,255,255,.2) 0%, transparent 100%),
    radial-gradient(1px 1px at 40% 10%, rgba(255,255,255,.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 55% 55%, rgba(255,255,255,.25) 0%, transparent 100%),
    radial-gradient(1px 1px at 70% 25%, rgba(255,255,255,.2) 0%, transparent 100%),
    radial-gradient(1px 1px at 85% 70%, rgba(255,255,255,.3) 0%, transparent 100%);
  pointer-events: none;
}
header { padding: 22px 52px; display: flex; align-items: center; gap: 18px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: rgba(10,13,18,.92); backdrop-filter: blur(16px); z-index: 100; }
.back-btn { display: flex; align-items: center; gap: 8px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 8px 14px; font-size: 13px; color: var(--text); text-decoration: none; font-family: 'Outfit', sans-serif; cursor: pointer; transition: all .18s; }
.back-btn:hover { border-color: #60a5fa; color: #60a5fa; }
.header-title { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 700; }
.header-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
.budget-badge { margin-left: auto; background: rgba(74,222,128,.1); border: 1px solid rgba(74,222,128,.25); color: #4ade80; border-radius: 20px; padding: 5px 14px; font-size: 12px; font-weight: 600; }
.hero { text-align: center; padding: 72px 40px 60px; position: relative; z-index: 1; }
.hero-eyebrow { font-size: 11px; letter-spacing: .18em; text-transform: uppercase; color: var(--muted); margin-bottom: 16px; }
.hero h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(42px, 6vw, 76px); font-weight: 700; line-height: 1.05; margin-bottom: 18px; background: linear-gradient(135deg, #e8eaf2 0%, #9ba3c0 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.hero p { font-size: 16px; color: var(--muted); max-width: 520px; margin: 0 auto 36px; line-height: 1.7; }
.filters { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 0; }
.filter-pill { padding: 8px 18px; border-radius: 24px; border: 1px solid var(--border); background: var(--surface); color: var(--muted); font-size: 12px; font-family: 'Outfit', sans-serif; cursor: pointer; transition: all .18s; }
.filter-pill:hover { color: var(--text); border-color: #60a5fa; }
.filter-pill.active { background: #60a5fa; border-color: #60a5fa; color: #000; font-weight: 600; }
.filter-pill.premium-pill.active { background: #f5c842; border-color: #f5c842; color: #000; }
main { max-width: 1240px; margin: 0 auto; padding: 52px 44px 100px; position: relative; z-index: 1; }
.destinations-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 24px; }
.dest-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; transition: transform .22s, border-color .22s, box-shadow .22s; cursor: pointer; animation: riseIn .5s ease both; }
@keyframes riseIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
.dest-card:hover { transform: translateY(-5px); box-shadow: 0 24px 60px rgba(0,0,0,.4); }
.dest-banner { height: 180px; position: relative; overflow: hidden; display: flex; align-items: flex-end; padding: 18px 20px; }
.dest-banner::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to top, rgba(10,13,18,.85) 0%, rgba(10,13,18,.1) 60%); }
.dest-emoji-bg { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 80px; opacity: .18; filter: blur(2px); }
.dest-flag { position: relative; z-index: 1; font-size: 28px; margin-right: 10px; }
.dest-name-banner { position: relative; z-index: 1; flex: 1; }
.dest-name-banner h3 { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 700; line-height: 1; }
.dest-name-banner .sub { font-size: 12px; color: rgba(255,255,255,.55); margin-top: 2px; }
.budget-tag { position: relative; z-index: 1; background: rgba(0,0,0,.5); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,.12); border-radius: 20px; padding: 4px 12px; font-size: 11px; font-weight: 600; }
.dest-body { padding: 20px 22px; }
.quick-infos { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 18px; }
.qi { background: var(--surface2); border-radius: 10px; padding: 10px; text-align: center; }
.qi .qi-val { font-size: 15px; font-weight: 600; margin-bottom: 2px; }
.qi .qi-lbl { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; }
.tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 18px; }
.tag { background: var(--surface3); border-radius: 6px; padding: 4px 10px; font-size: 11px; color: var(--muted); }
.premium-tag { background: rgba(245,200,66,.12); color: #f5c842; border: 1px solid rgba(245,200,66,.25); border-radius: 6px; padding: 3px 10px; font-size: 11px; font-weight: 600; margin-bottom: 12px; display: inline-block; }
.btn-prog { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 11px; font-family: 'Outfit', sans-serif; font-size: 13px; font-weight: 500; color: var(--text); cursor: pointer; transition: all .18s; display: flex; align-items: center; justify-content: center; gap: 7px; }
.btn-prog:hover { background: var(--surface3); border-color: #60a5fa; color: #60a5fa; }
#progModal { position: fixed; inset: 0; background: rgba(5,7,12,.88); backdrop-filter: blur(14px); z-index: 500; display: none; overflow-y: auto; padding: 32px 20px; }
#progModal.open { display: block; }
.prog-wrapper { max-width: 780px; margin: 0 auto; background: var(--surface); border: 1px solid var(--border); border-radius: 24px; overflow: hidden; animation: popIn .35s cubic-bezier(.34,1.56,.64,1); position: relative; }
@keyframes popIn { from { opacity:0; transform:scale(.92) translateY(24px); } to { opacity:1; transform:scale(1) translateY(0); } }
.prog-header { padding: 32px 36px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; gap: 16px; }
.prog-flag { font-size: 42px; flex-shrink: 0; }
.prog-titles { flex: 1; }
.prog-titles h2 { font-family: 'Cormorant Garamond', serif; font-size: 30px; font-weight: 700; line-height: 1; margin-bottom: 4px; }
.prog-titles .prog-sub { font-size: 13px; color: var(--muted); }
.prog-budget-big { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 700; text-align: right; }
.prog-budget-big .pbb-lbl { font-size: 11px; color: var(--muted); font-family: 'Outfit', sans-serif; font-weight: 400; }
.prog-close { position: absolute; top: 18px; right: 20px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; font-size: 16px; cursor: pointer; transition: all .15s; color: var(--muted); }
.prog-close:hover { background: var(--surface3); color: var(--text); }
.budget-breakdown { padding: 20px 36px; display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; border-bottom: 1px solid var(--border); }
.bb-item { background: var(--surface2); border-radius: 10px; padding: 12px; text-align: center; }
.bb-item .bb-icon { font-size: 18px; margin-bottom: 5px; }
.bb-item .bb-val { font-size: 15px; font-weight: 600; margin-bottom: 2px; }
.bb-item .bb-lbl { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
.prog-days { padding: 24px 36px 32px; }
.prog-days h3 { font-family: 'Cormorant Garamond', serif; font-size: 19px; margin-bottom: 18px; color: var(--muted); font-style: italic; }
.day-block { margin-bottom: 20px; display: flex; gap: 16px; animation: fadeIn .4s ease both; }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:translateY(0);} }
.day-num-col { flex-shrink: 0; width: 44px; text-align: center; }
.day-circle { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #000; margin-bottom: 4px; position: relative; }
.day-circle::after { content: ''; position: absolute; top: 44px; left: 50%; transform: translateX(-50%); width: 1px; height: calc(100% + 12px); background: var(--border); }
.day-block:last-child .day-circle::after { display: none; }
.day-content { flex: 1; padding-top: 6px; padding-bottom: 20px; }
.day-title { font-weight: 600; font-size: 15px; margin-bottom: 4px; }
.day-loc { font-size: 11px; color: var(--muted); margin-bottom: 10px; display: flex; align-items: center; gap: 4px; }
.day-activities { display: flex; flex-direction: column; gap: 7px; }
.activity { display: flex; gap: 10px; align-items: flex-start; background: var(--surface2); border-radius: 10px; padding: 10px 13px; }
.activity-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
.activity-text { flex: 1; }
.activity-name { font-size: 13px; font-weight: 500; margin-bottom: 2px; }
.activity-detail { font-size: 11px; color: var(--muted); line-height: 1.5; }
.activity-cost { font-size: 11px; font-weight: 600; flex-shrink: 0; background: var(--surface3); border-radius: 6px; padding: 2px 8px; align-self: flex-start; margin-top: 2px; white-space: nowrap; }
.tips-section { margin: 0 36px 32px; background: rgba(96,165,250,.06); border: 1px solid rgba(96,165,250,.18); border-radius: 14px; padding: 18px 20px; }
.tips-section h4 { font-size: 13px; color: #60a5fa; margin-bottom: 12px; font-weight: 600; }
.tips-list { display: flex; flex-direction: column; gap: 7px; }
.tip-item { font-size: 12px; color: var(--muted); display: flex; gap: 8px; line-height: 1.5; }
.tip-item::before { content: 'rightarrow'; color: #60a5fa; flex-shrink: 0; }
@media(max-width:768px){
  header { padding: 14px 16px; }
  main { padding: 32px 14px 80px; }
  .hero { padding: 48px 16px 40px; }
  .destinations-grid { grid-template-columns: 1fr; }
  .prog-header { padding: 24px 20px 18px; flex-wrap: wrap; }
  .budget-breakdown { grid-template-columns: repeat(2,1fr); padding: 16px 20px; }
  .prog-days { padding: 20px 20px 28px; }
  .tips-section { margin: 0 20px 28px; }
}
</style>
</head>
<body>
<header>
  <a class="back-btn" href="index.html">- Calendrier</a>
  <div>
    <div class="header-title">Destinations</div>
    <div class="header-sub">Programmes 10 jours pour 7</div>
  </div>
  <div class="budget-badge">Budget maitrise</div>
</header>
<div class="hero">
  <div class="hero-eyebrow">Pour votre prochain voyage en equipe</div>
  <h1>Ou partir a 7<br>sans se ruiner ?</h1>
  <p>10 destinations avec un programme complet de 10 jours, activites et budget estime par personne.</p>
  <div class="filters">
    <button class="filter-pill active" onclick="filterDest('all',this)">Toutes</button>
    <button class="filter-pill" onclick="filterDest('asie',this)">Asie</button>
    <button class="filter-pill" onclick="filterDest('europe',this)">Europe</button>
    <button class="filter-pill" onclick="filterDest('afrique',this)">Afrique</button>
    <button class="filter-pill premium-pill" onclick="filterDest('premium',this)">Premium</button>
  </div>
</div>
<main>
  <div class="destinations-grid" id="destGrid"></div>
</main>
<div id="progModal" onclick="if(event.target===this)closeModal()">
  <div class="prog-wrapper" id="progWrapper"></div>
</div>
<script>
var DEST = [];

// Fonction helper pour creer une destination
function mkDest(id, name, country, flag, emoji, region, color, colorDark, budget, vol, hotel, repas, act, season, tags, desc, tips, days) {
  return {id:id, name:name, country:country, flag:flag, emoji:emoji, region:region, color:color, colorDark:colorDark,
    budget:budget, budgetDetail:{vol:vol, hotel:hotel, repas:repas, activites:act},
    duration:'10 jours', bestSeason:season, tags:tags, description:desc, tips:tips, days:days, premium:region==='premium'};
}

function mkDay(title, location, color, acts) {
  return {title:title, location:location, color:color, activities:acts};
}

function mkAct(icon, name, detail, cost) {
  return {icon:icon, name:name, detail:detail, cost:cost};
}

      mkAct('coucher','See you Bali','Selamat jalan ! On repart avec la tete pleine.','coeur')
    ])
  ]
));

// Resoudre flag/emoji/icon
function resolveFlag(f) { return FLAGS[f] || f; }
function resolveEmoji(e) { return EMOJIS[e] || e; }
function resolveIcon(i) { return ICONS[i] || i || '📌'; }

// ══════════════════════════════════════════════════════
//  RENDU
// ══════════════════════════════════════════════════════
var currentFilter = 'all';

function renderCards(filter) {
  var grid = document.getElementById('destGrid');
  grid.innerHTML = '';
  var filtered = filter === 'all' ? DEST : DEST.filter(function(d) { return d.region === filter; });

  filtered.forEach(function(dest, i) {
    var card = document.createElement('div');
    card.className = 'dest-card';
    card.style.animationDelay = (i * 0.07) + 's';
    if (dest.premium) card.style.border = '1px solid rgba(245,200,66,0.35)';

    var flag = resolveFlag(dest.flag);
    var emoji = resolveEmoji(dest.emoji);
    var premiumBadge = dest.premium ? '<div class="premium-tag">Destination Premium</div>' : '';

    card.innerHTML =
      '<div class="dest-banner" style="background:linear-gradient(135deg,' + dest.colorDark + ' 0%,#0a0d12 100%);">' +
        '<div class="dest-emoji-bg">' + emoji + '</div>' +
        '<span class="dest-flag">' + flag + '</span>' +
        '<div class="dest-name-banner"><h3>' + dest.name + '</h3><div class="sub">' + dest.country + ' &middot; ' + dest.duration + '</div></div>' +
        '<div class="budget-tag" style="color:' + dest.color + '">' + dest.budget + '<br><span style="font-size:9px;opacity:.7">par personne</span></div>' +
      '</div>' +
      '<div class="dest-body">' +
        premiumBadge +
        '<div class="quick-infos">' +
          '<div class="qi"><div class="qi-val" style="color:' + dest.color + '">' + dest.budget + '</div><div class="qi-lbl">Budget</div></div>' +
          '<div class="qi"><div class="qi-val">10j</div><div class="qi-lbl">Duree</div></div>' +
          '<div class="qi"><div class="qi-val">' + dest.bestSeason + '</div><div class="qi-lbl">Saison</div></div>' +
        '</div>' +
        '<div class="tags">' + dest.tags.map(function(t){ return '<span class="tag">' + t + '</span>'; }).join('') + '</div>' +
        '<p style="font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:16px;">' + dest.description + '</p>' +
        '<button class="btn-prog" onclick="openProg(\'' + dest.id + '\')">Voir le programme 10 jours</button>' +
      '</div>';

    grid.appendChild(card);
  });
}

function filterDest(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-pill').forEach(function(p) { p.classList.remove('active'); });
  btn.classList.add('active');
  renderCards(f);
}

function openProg(id) {
  var dest = null;
  for (var i = 0; i < DEST.length; i++) { if (DEST[i].id === id) { dest = DEST[i]; break; } }
  if (!dest) return;

  var flag = resolveFlag(dest.flag);

  var daysHtml = dest.days.map(function(day, i) {
    var actsHtml = day.activities.map(function(a) {
      var icon = resolveIcon(a.icon);
      return '<div class="activity">' +
        '<div class="activity-icon">' + icon + '</div>' +
        '<div class="activity-text">' +
          '<div class="activity-name">' + a.name + '</div>' +
          '<div class="activity-detail">' + a.detail + '</div>' +
        '</div>' +
        '<div class="activity-cost">' + a.cost + '</div>' +
      '</div>';
    }).join('');

    return '<div class="day-block" style="animation-delay:' + (i*0.06) + 's">' +
      '<div class="day-num-col"><div class="day-circle" style="background:' + day.color + '">J' + (i+1) + '</div></div>' +
      '<div class="day-content">' +
        '<div class="day-title">' + day.title + '</div>' +
        '<div class="day-loc">' + day.location + '</div>' +
        '<div class="day-activities">' + actsHtml + '</div>' +
      '</div>' +
    '</div>';
  }).join('');

  var tipsHtml = dest.tips.map(function(t) {
    return '<div class="tip-item">' + t + '</div>';
  }).join('');

  document.getElementById('progWrapper').innerHTML =
    '<button class="prog-close" onclick="closeModal()">x</button>' +
    '<div class="prog-header">' +
      '<div class="prog-flag">' + flag + '</div>' +
      '<div class="prog-titles"><h2>' + dest.name + ', ' + dest.country + '</h2><div class="prog-sub">Programme 10 jours pour 7 personnes &middot; ' + dest.bestSeason + '</div></div>' +
      '<div class="prog-budget-big"><div class="pbb-lbl">Budget</div>' + dest.budget + '<div style="font-size:11px;color:var(--muted)">par personne</div></div>' +
    '</div>' +
    '<div class="budget-breakdown">' +
      '<div class="bb-item"><div class="bb-icon">✈️</div><div class="bb-val">' + dest.budgetDetail.vol + '</div><div class="bb-lbl">Vol A/R</div></div>' +
      '<div class="bb-item"><div class="bb-icon">🏨</div><div class="bb-val">' + dest.budgetDetail.hotel + '</div><div class="bb-lbl">Hebergement</div></div>' +
      '<div class="bb-item"><div class="bb-icon">🍜</div><div class="bb-val">' + dest.budgetDetail.repas + '</div><div class="bb-lbl">Repas</div></div>' +
      '<div class="bb-item"><div class="bb-icon">🎟️</div><div class="bb-val">' + dest.budgetDetail.activites + '</div><div class="bb-lbl">Activites</div></div>' +
    '</div>' +
    '<div class="prog-days"><h3>Programme jour par jour</h3>' + daysHtml + '</div>' +
    '<div class="tips-section"><h4>Conseils pratiques pour ' + dest.name + '</h4><div class="tips-list">' + tipsHtml + '</div></div>';

  document.getElementById('progModal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('progModal').classList.remove('open');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeModal(); });

renderCards('all');
</script>
